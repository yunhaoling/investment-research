name: Build Markdown to HTML

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"          # only runs when a .md file changes
      - "build.py"         # or when the build script itself changes

  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write      # needed to commit generated files back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install markdown pygments

      - name: Build HTML
        run: python build.py

      - name: Commit generated HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add **/*.html
          # only commit if there are actual changes
          git diff --cached --quiet || git commit -m "build: regenerate HTML from markdown [skip ci]"
          git push
